name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout files
      uses: actions/checkout@v7

    - name: Setup Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm clean-install --progress=false --no-fund

    - name: Build
      run: npm run build

    - name: Check build size and static deduplication
      run: |
        SIZE_MB=$(du -sm build | cut -f1)
        echo "Total build size: ${SIZE_MB} MB"
        for dir in img video downloads; do
          if [ -d "build/ja/${dir}" ]; then
            echo "::error::build/ja/${dir} should not exist (static assets must not be duplicated per locale)"
            exit 1
          fi
        done
        if [ "$SIZE_MB" -gt 950 ]; then
          echo "::warning::Build size ${SIZE_MB} MB exceeds 950 MB GitHub Pages safety target (see issue #880)"
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout files
      uses: actions/checkout@v7

    - name: Setup Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install dependencies
      run: npm clean-install --progress=false --no-fund

    - name: Lint
      run: npm run lint
